# Configuración Netlify para NutriMás

[build]
  publish = "."

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/javascript"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/"
  to = "/dietetica-app.html"
  status = 200

[[redirects]]
  from = "/tienda"
  to = "/tienda.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/dietetica-app.html"
  status = 200
